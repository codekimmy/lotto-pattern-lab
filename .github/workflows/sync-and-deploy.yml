name: Sync Lotto Data and Deploy Pages

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "index.html"
      - "scripts/**"
      - "data/**"
      - ".github/workflows/sync-and-deploy.yml"

  schedule:
    # Sunday 08:17 and 14:17 in Korea.
    # Two runs provide a second chance if the sheet is updated late.
    - cron: "17 8 * * 0"
      timezone: "Asia/Seoul"
    - cron: "17 14 * * 0"
      timezone: "Asia/Seoul"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download and validate Google Sheets data
        env:
          SHEET_CSV_URL: "https://docs.google.com/spreadsheets/d/1w1AZshic7KGnbb0lqjfg_aUx5F9RzGBtJykFJuaP-lM/export?format=csv&gid=0"
        run: python scripts/sync_sheet.py

      - name: Commit validated data snapshot
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lotto_history.csv data/meta.json

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: sync lotto history"
            git push
          fi

      - name: Build static Pages artifact
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site/data
          cp index.html _site/index.html
          cp data/lotto_history.csv _site/data/lotto_history.csv
          cp data/meta.json _site/data/meta.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "_site"

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
